<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Course Project Intelligence MCP Server</title>
  <desc id="desc">Animated overview showing GitHub course repositories flowing through MCP tools into an evidence pack.</desc>
  <style>
    @keyframes drift {
      0% { transform: translateX(-80px); opacity: .25; }
      45% { opacity: .95; }
      100% { transform: translateX(80px); opacity: .25; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .78; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes glow {
      0%, 100% { stroke-opacity: .2; }
      50% { stroke-opacity: .95; }
    }
    @keyframes scan {
      0% { transform: translateY(-130px); opacity: 0; }
      15% { opacity: .55; }
      75% { opacity: .55; }
      100% { transform: translateY(130px); opacity: 0; }
    }
    .bg { fill: url(#bg); }
    .grid { stroke: rgba(255,255,255,.14); stroke-width: 1; }
    .title { fill: #f8fafc; font: 700 48px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .subtitle { fill: #cbd5e1; font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #e5e7eb; font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { fill: #94a3b8; font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .card { fill: rgba(15, 23, 42, .72); stroke: rgba(148, 163, 184, .28); stroke-width: 1.2; }
    .line { stroke: url(#line); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 15; animation: glow 2.8s ease-in-out infinite; }
    .dot { animation: pulse 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .spark { animation: drift 5.6s ease-in-out infinite alternate; }
    .scan { animation: scan 3.8s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .line, .dot, .spark, .scan { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset=".48" stop-color="#122033"/>
      <stop offset="1" stop-color="#06141f"/>
    </linearGradient>
    <linearGradient id="line" x1="260" y1="225" x2="950" y2="225" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset=".5" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(915 128) rotate(92) scale(210 380)">
      <stop stop-color="#38bdf8" stop-opacity=".35"/>
      <stop offset=".55" stop-color="#22c55e" stop-opacity=".15"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect class="bg" width="1200" height="420" rx="28"/>
  <circle cx="918" cy="145" r="220" fill="url(#halo)" filter="url(#soft)"/>

  <g opacity=".45">
    <path class="grid" d="M80 58H1120"/>
    <path class="grid" d="M80 118H1120"/>
    <path class="grid" d="M80 178H1120"/>
    <path class="grid" d="M80 238H1120"/>
    <path class="grid" d="M80 298H1120"/>
    <path class="grid" d="M80 358H1120"/>
    <path class="grid" d="M160 38V382"/>
    <path class="grid" d="M320 38V382"/>
    <path class="grid" d="M480 38V382"/>
    <path class="grid" d="M640 38V382"/>
    <path class="grid" d="M800 38V382"/>
    <path class="grid" d="M960 38V382"/>
  </g>

  <g class="spark" opacity=".65">
    <circle cx="170" cy="75" r="4" fill="#38bdf8"/>
    <circle cx="1010" cy="335" r="5" fill="#22c55e"/>
    <circle cx="860" cy="78" r="3" fill="#f59e0b"/>
  </g>

  <text x="82" y="102" class="title">Course Project Intelligence</text>
  <text x="84" y="138" class="subtitle">GitHub course project discovery, inspection, comparison, and Evidence Pack generation for MCP hosts.</text>

  <g transform="translate(92 200)">
    <rect class="card" width="252" height="118" rx="18"/>
    <text x="24" y="40" class="label">GitHub Sources</text>
    <text x="24" y="70" class="small">course projects · labs · reports</text>
    <text x="24" y="94" class="small">README · src · SQL · docs</text>
    <circle class="dot" cx="217" cy="38" r="13" fill="#38bdf8"/>
  </g>

  <path class="line" d="M365 259C448 215 520 215 596 259"/>

  <g transform="translate(475 176)">
    <rect class="card" width="270" height="164" rx="20"/>
    <rect class="scan" x="18" y="28" width="234" height="40" rx="12" fill="#38bdf8" opacity=".18"/>
    <text x="24" y="45" class="label">MCP Tool Router</text>
    <text x="24" y="80" class="small">search_course_projects</text>
    <text x="24" y="106" class="small">inspect_course_project</text>
    <text x="24" y="132" class="small">build_course_context</text>
    <circle class="dot" cx="230" cy="126" r="13" fill="#22c55e" style="animation-delay:.4s"/>
  </g>

  <path class="line" d="M763 259C842 216 910 216 1000 259" style="animation-delay:.35s"/>

  <g transform="translate(856 200)">
    <rect class="card" width="252" height="118" rx="18"/>
    <text x="24" y="40" class="label">Evidence Pack</text>
    <text x="24" y="70" class="small">source attribution · risk flags</text>
    <text x="24" y="94" class="small">citation hints · safe usage</text>
    <circle class="dot" cx="217" cy="38" r="13" fill="#f59e0b" style="animation-delay:.8s"/>
  </g>

  <g transform="translate(84 356)">
    <rect x="0" y="0" width="154" height="30" rx="15" fill="rgba(56,189,248,.14)" stroke="rgba(56,189,248,.38)"/>
    <text x="18" y="20" class="small" fill="#bae6fd">stdio transport</text>
    <rect x="168" y="0" width="164" height="30" rx="15" fill="rgba(34,197,94,.14)" stroke="rgba(34,197,94,.38)"/>
    <text x="186" y="20" class="small" fill="#bbf7d0">streamable HTTP</text>
    <rect x="346" y="0" width="180" height="30" rx="15" fill="rgba(245,158,11,.14)" stroke="rgba(245,158,11,.38)"/>
    <text x="364" y="20" class="small" fill="#fde68a">learning reference only</text>
  </g>
</svg>
